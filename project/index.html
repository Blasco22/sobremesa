<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sobremesa · recetario</title>
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: 'Helvetica Neue', system-ui, sans-serif; }
  /* Container around prototype frames inside artboards */
  .frame { position: relative; width: 100%; height: 100%; overflow: hidden; }
  .mob-frame {
    position: absolute; inset: 0;
    border-radius: 38px;
    overflow: hidden;
    box-shadow: 0 0 0 10px #1a1612, 0 0 0 12px #2a2520;
    background: var(--cream);
  }
  .mob-notch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 28px; background: #1a1612; border-radius: 999px; z-index: 50;
    pointer-events: none;
  }
  .mob-home {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 4px; background: #1a1612; border-radius: 2px; z-index: 50;
    opacity: 0.4; pointer-events: none;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel" src="desktop-screens.jsx"></script>
<script type="text/babel" src="desktop-screens-2.jsx"></script>
<script type="text/babel" src="mobile.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "warm",
  "accent": "#7a8259",
  "displayFont": "instrument"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply theme + accent + font live
  React.useEffect(() => {
    const root = document.documentElement;
    if (t.theme === 'herbal') root.classList.add('theme-herbal');
    else root.classList.remove('theme-herbal');
    root.style.setProperty('--terracotta', t.accent);
    root.style.setProperty('--terracotta-2', t.accent);
    if (t.displayFont === 'fraunces') {
      if (!document.getElementById('fnt-fraunces')) {
        const l = document.createElement('link');
        l.id = 'fnt-fraunces';
        l.rel = 'stylesheet';
        l.href = 'https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&display=swap';
        document.head.appendChild(l);
      }
      root.style.setProperty('--serif', 'Fraunces, Georgia, serif');
    } else if (t.displayFont === 'newsreader') {
      if (!document.getElementById('fnt-news')) {
        const l = document.createElement('link');
        l.id = 'fnt-news';
        l.rel = 'stylesheet';
        l.href = 'https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap';
        document.head.appendChild(l);
      }
      root.style.setProperty('--serif', 'Newsreader, Georgia, serif');
    } else {
      root.style.setProperty('--serif', "'Instrument Serif', Georgia, serif");
    }
  }, [t.theme, t.accent, t.displayFont]);

  return (
    <>
      <DesignCanvas>
        <DCSection id="prototypes" title="Sobremesa · prototipo" subtitle="Desktop completo + móvil. Click en cualquier elemento para navegar.">
          <DCArtboard id="desktop" label="Desktop · 1280×900" width={1280} height={900}>
            <div className="frame"><SDesktop /></div>
          </DCArtboard>
          <DCArtboard id="mobile" label="Mobile · 390×844" width={430} height={884}>
            <div style={{ position: 'relative', width: '100%', height: '100%', background: '#1a1612', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ width: 390, height: 844, position: 'relative' }}>
                <div className="mob-frame">
                  <div className="mob-notch"></div>
                  <SMobile />
                  <div className="mob-home"></div>
                </div>
              </div>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="system" title="Sistema visual" subtitle="Tokens, tipografía y componentes que sostienen la marca.">
          <DCArtboard id="brand" label="Marca · Sobremesa" width={640} height={420}>
            <div className="sobremesa" style={{ padding: 40, height: '100%', display: 'flex', flexDirection: 'column' }}>
              <div className="s-eyebrow" style={{ marginBottom: 12 }}>identidad</div>
              <h1 className="s-serif" style={{ fontSize: 56, lineHeight: 1.0, letterSpacing: '-0.025em', marginBottom: 20 }}>
                <SBrand size={56}/>
              </h1>
              <p style={{ fontSize: 14, color: 'var(--soft)', lineHeight: 1.55, maxWidth: 460, marginBottom: 'auto', textWrap: 'pretty' }}>
                <em>Sobremesa</em> es ese rato sin reloj después de comer — la conversación, los cafés que se enfrían, las recetas que pasan de mano en mano.
              </p>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--soft)' }}>
                <span style={{ color: 'var(--ink)' }}>tu cocina, sin prisa</span>
                <span>·</span>
                <span>tagline</span>
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="palette" label="Paleta" width={520} height={420}>
            <div className="sobremesa" style={{ padding: 32, height: '100%' }}>
              <div className="s-eyebrow" style={{ marginBottom: 16 }}>colores</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
                {[
                  { c: '#f4ede4', n: 'cream' },
                  { c: '#fbf6ee', n: 'paper' },
                  { c: '#1a1612', n: 'ink' },
                  { c: '#c8593a', n: 'terracotta' },
                  { c: '#7a8259', n: 'oliva' },
                  { c: '#c89a3a', n: 'mostaza' },
                ].map(s => (
                  <div key={s.n}>
                    <div style={{ background: s.c, height: 80, borderRadius: 6, border: '1px solid var(--hair)' }}/>
                    <div style={{ marginTop: 8, fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--soft)' }}>{s.c}</div>
                    <div style={{ fontSize: 12, color: 'var(--ink)' }}>{s.n}</div>
                  </div>
                ))}
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="type" label="Tipografía" width={640} height={420}>
            <div className="sobremesa" style={{ padding: 32, height: '100%' }}>
              <div className="s-eyebrow" style={{ marginBottom: 12 }}>tipografía</div>
              <div className="s-serif" style={{ fontSize: 56, lineHeight: 1, letterSpacing: '-0.025em' }}>
                Crema de calabaza<br/><em>asada</em>
              </div>
              <div style={{ marginTop: 16, paddingTop: 16, borderTop: '1px solid var(--hair)' }}>
                <div style={{ fontSize: 11, color: 'var(--soft)' }}>Display · Instrument Serif</div>
                <div style={{ fontSize: 14, marginTop: 12 }}>UI · Helvetica Neue · 13.5px lectura</div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--soft)', marginTop: 8 }}>MONO · IBM PLEX · 11PX · ETIQUETAS</div>
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="components" label="Componentes" width={640} height={420}>
            <div className="sobremesa" style={{ padding: 32, height: '100%', display: 'flex', flexDirection: 'column', gap: 20 }}>
              <div className="s-eyebrow">componentes</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                <SChip on dot>cebolla</SChip>
                <SChip on dot>ajo</SChip>
                <SChip>tomate</SChip>
                <SChip>+ añadir</SChip>
                <SMatchBadge match={92}/>
                <SMatchBadge match={64}/>
              </div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <button type="button" className="s-btn">primary</button>
                <button type="button" className="s-btn ghost">ghost</button>
                <button type="button" className="s-btn terracotta">accent</button>
                <button type="button" className="s-btn sm">small</button>
              </div>
              <div style={{ display: 'flex', gap: 12 }}>
                <span className="s-step-num">1</span>
                <span className="s-step-num">2</span>
                <span className="s-step-num">3</span>
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="import" label="Formato del archivo" width={520} height={420}>
            <div className="sobremesa" style={{ padding: 28, height: '100%', overflow: 'hidden' }}>
              <div className="s-eyebrow" style={{ marginBottom: 12 }}>formato de import · .md</div>
              <pre style={{
                fontFamily: 'var(--mono)', fontSize: 10.5, lineHeight: 1.6,
                background: 'var(--paper-2)', padding: 14, borderRadius: 6,
                color: 'var(--ink-2)', margin: 0,
                whiteSpace: 'pre-wrap', overflow: 'hidden',
              }}>{`---
title: Crema de calabaza asada
servings: 4
time: 45m
difficulty: fácil
tags: sopa, otoño
photo: calabaza.jpg
---

# Ingredientes
- 1 calabaza moscada
- 1 cebolla
- 200 ml nata

# Pasos
1. Hornea la calabaza. ⏱ 35m
2. Pocha la base.
3. Tritura todo con la nata.

# Notas
texto libre, opcional.`}</pre>
            </div>
          </DCArtboard>
        </DCSection>

        <DCPostIt top={56} right={80} rotate={3} width={200}>
          desktop + móvil son interactivos · navega entre pantallas haciendo click
        </DCPostIt>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Tema">
          <TweakRadio label="Modo" value={t.theme} options={[
            { value: 'warm', label: 'cálido' },
            { value: 'herbal', label: 'oscuro' },
          ]} onChange={v => setTweak('theme', v)} />
        </TweakSection>
        <TweakSection label="Color de acento">
          <TweakColor label="Acento" value={t.accent}
            options={['#c8593a', '#7a8259', '#c89a3a', '#a35a8a']}
            onChange={v => setTweak('accent', v)} />
        </TweakSection>
        <TweakSection label="Tipografía display">
          <TweakSelect label="Serif" value={t.displayFont}
            options={[
              { value: 'instrument', label: 'Instrument Serif' },
              { value: 'newsreader', label: 'Newsreader' },
              { value: 'fraunces', label: 'Fraunces' },
            ]}
            onChange={v => setTweak('displayFont', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
